<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Functions</title>
	</head>
	<body>
		<h1>Here Be Function</h1>
		<script>
			//this returns nothing
			//instead, it goes and interacts with the browser
			//"function robot"
			console.log("test"); //calling or executing

			//defining a function
			function sayHi(){
				console.log("hi");
			}

			//call/execute the function
			syaHi();

			//function can take parameters
			// just like f(x)
			function sayHiToSomeone(who){
				console.log("hi"+who);
			}
			
			//call the function
			sayHiToSomeone("Chris");
			sayHiToSomeone("Colin");

			//functions can have many parameters
			//g(x,y)
			function sayHiToTwoPeople(who1, who2){
				console.log('hi " + who1 + " and " + who2);
			}

			sayHiToTwoPeople
		</script>
	</body>
</html>
